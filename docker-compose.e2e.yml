services:
  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    networks: [e2e_net]

  mock-vllm:
    build:
      context: ./docker/mock-vllm
      dockerfile: Dockerfile
    ports:
      - "18000:8000"
    networks: [e2e_net]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - ./docker/litellm/config.e2e.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      - mock-vllm
    networks: [e2e_net]

networks:
  e2e_net:
    driver: bridge
