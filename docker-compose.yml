  orchestrator-api:
    # Image pré-construite (évite un rebuild à chaque `compose up`). Rebuild manuel si le code change :
    #   docker build -t offline-ci-orchestrator:latest ./orchestrator
    image: ${ORCHESTRATOR_IMAGE:-offline-ci-orchestrator:latest}
    pull_policy: never
    container_name: ci-orchestrator-api
    command: ["python", "-m", "app.main", "webhook"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GITEA_WEBHOOK_SECRET=${GITEA_WEBHOOK_SECRET}
      - MAX_FIX_LOOPS=${MAX_FIX_LOOPS:-5}
      - TEST_IMAGE=${TEST_IMAGE:-offline-ci-python:3.11}
      - TEST_COMMAND=${TEST_COMMAND:-pytest -q}
      - GITEA_BASE_URL=${GITEA_BASE_URL}
      - GITEA_TOKEN=${GITEA_TOKEN}
      - BOT_GIT_NAME=${BOT_GIT_NAME:-ci-agent-bot}
      - BOT_GIT_EMAIL=${BOT_GIT_EMAIL:-ci-agent@local.lan}
      - OPENCODE_SCRIPT=/workspace/scripts/opencode_ci_agent.sh
      - OPENCODE_MODEL=${OPENCODE_MODEL:-chat-fast}
      - OPENCODE_MODEL_CONTEXT=${OPENCODE_MODEL_CONTEXT:-8192}
      - OPENCODE_MODEL_MAX_OUTPUT=${OPENCODE_MODEL_MAX_OUTPUT:-2048}
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_API_KEY}
    volumes:
      - ./scripts:/workspace/scripts:ro
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks: [ci_net]

  orchestrator-worker:
    image: ${ORCHESTRATOR_IMAGE:-offline-ci-orchestrator:latest}
    pull_policy: never
    container_name: ci-orchestrator-worker
    command: ["python", "-m", "app.main", "worker"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GITEA_WEBHOOK_SECRET=${GITEA_WEBHOOK_SECRET}
      - MAX_FIX_LOOPS=${MAX_FIX_LOOPS:-5}
      - TEST_IMAGE=${TEST_IMAGE:-offline-ci-python:3.11}
      - TEST_COMMAND=${TEST_COMMAND:-pytest -q}
      - GITEA_BASE_URL=${GITEA_BASE_URL}
      - GITEA_TOKEN=${GITEA_TOKEN}
      - BOT_GIT_NAME=${BOT_GIT_NAME:-ci-agent-bot}
      - BOT_GIT_EMAIL=${BOT_GIT_EMAIL:-ci-agent@local.lan}
      - OPENCODE_SCRIPT=/workspace/scripts/opencode_ci_agent.sh
      - OPENCODE_MODEL=${OPENCODE_MODEL:-chat-fast}
      - OPENCODE_MODEL_CONTEXT=${OPENCODE_MODEL_CONTEXT:-8192}
      - OPENCODE_MODEL_MAX_OUTPUT=${OPENCODE_MODEL_MAX_OUTPUT:-2048}
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - SANDBOX_NETWORK=${SANDBOX_NETWORK:-none}
      - SANDBOX_CPU_LIMIT=${SANDBOX_CPU_LIMIT:-2}
      - SANDBOX_MEMORY_LIMIT=${SANDBOX_MEMORY_LIMIT:-4g}
    volumes:
      - ./scripts:/workspace/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ci_workdir:/tmp/ci-workdir
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    restart: unless-stopped
    networks: [ci_net]

networks:
  ci_net:
    driver: bridge

volumes:
  redis_data:
  ci_workdir:
  postgres_data:
