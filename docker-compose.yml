services:
  redis:
    image: redis:7.2-alpine
    container_name: ci-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ci_net]

  postgres:
    image: postgres:16-alpine
    container_name: ci-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ci_net]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-gateway
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_DATABASE_URL=${LITELLM_DATABASE_URL}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      vllm-fast:
        condition: service_started
      # - vllm-balanced
      # - vllm-heavy
    networks: [ci_net]

  vllm-fast:
    image: vllm/vllm-openai:latest
    container_name: vllm-fast
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${VLLM_FAST_VISIBLE_DEVICES:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - VLLM_MODEL=${VLLM_FAST_MODEL}
      - VLLM_SERVED_MODEL_NAME=${VLLM_FAST_SERVED_MODEL_NAME:-qwen-fast}
      - VLLM_MAX_MODEL_LEN=${VLLM_FAST_MAX_MODEL_LEN:-16384}
      - VLLM_GPU_MEMORY_UTILIZATION=${VLLM_FAST_GPU_MEMORY_UTILIZATION:-0.9}
      - VLLM_TENSOR_PARALLEL_SIZE=${VLLM_FAST_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_DTYPE=${VLLM_FAST_DTYPE:-bfloat16}
      - VLLM_EXTRA_ARGS=${VLLM_FAST_EXTRA_ARGS:-}
    volumes:
      - ./docker/vllm/start-vllm.sh:/start-vllm.sh:ro
      - ${VLLM_HOST_MODELS_DIR:-./models}:/models
    entrypoint: ["/bin/bash", "/start-vllm.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks: [ci_net]

