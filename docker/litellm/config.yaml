general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null
  disable_spend_logs: true

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 2
  timeout: 120
  redis_host: "redis"
  redis_port: 6379
  redis_password: null
  cache_responses: false

litellm_settings:
  drop_params: true
  set_verbose: false

model_list:
  - model_name: chat-fast
    litellm_params:
      model: openai/qwen-fast
      api_base: http://vllm-fast:8000/v1
      api_key: "offline-key"
      rpm: 300
      tpm: 240000

  - model_name: chat-balanced
    litellm_params:
      model: openai/qwen-balanced
      api_base: http://vllm-balanced:8000/v1
      api_key: "offline-key"
      rpm: 120
      tpm: 320000

  - model_name: chat-heavy
    litellm_params:
      model: openai/qwen35-122b
      api_base: http://vllm-heavy:8000/v1
      api_key: "offline-key"
      rpm: 40
      tpm: 240000

  # Keep CI model stable for orchestrator default.
  - model_name: qwen35-122b-ci
    litellm_params:
      model: openai/qwen35-122b
      api_base: http://vllm-heavy:8000/v1
      api_key: "offline-key"
      rpm: 20
      tpm: 60000

  # Add new routed models by duplicating one block and updating:
  # - model_name
  # - litellm_params.model
  # - api_base (new vLLM endpoint if needed)
  # - rpm/tpm according to your SLO

key_management_settings:
  - key: os.environ/LITELLM_API_KEY
    models:
      - chat-fast
      - chat-balanced
      - chat-heavy
      - qwen35-122b-ci
    aliases:
      fast: chat-fast
      balanced: chat-balanced
      heavy: chat-heavy
      ci: qwen35-122b-ci
      default: chat-balanced
